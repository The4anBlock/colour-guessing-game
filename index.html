<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colour Guessing Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #121212;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── Shared screen hiding ── */
    .screen { display: none; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ── Start screen ── */
    #start-screen {
      gap: 1.5rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }

    #start-screen h1 {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.03em;
      margin-bottom: 0;
    }

    #start-screen p {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .difficulty-btn {
      width: 100%;
      padding: 1rem 1.5rem;
      border: 2px solid transparent;
      border-radius: 14px;
      background: #1e1e1e;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .difficulty-btn:hover  { background: #2a2a2a; transform: scale(1.02); }
    .difficulty-btn:active { transform: scale(0.98); }

    .difficulty-btn.easy   { border-color: #4ade80; }
    .difficulty-btn.medium { border-color: #facc15; }
    .difficulty-btn.hard   { border-color: #f87171; }

    .diff-icon {
      font-size: 1.8rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .diff-text { display: flex; flex-direction: column; gap: 2px; }

    .diff-name {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .diff-desc {
      font-size: 0.78rem;
      color: #666;
      line-height: 1.4;
    }

    /* ── HUD ── */
    #hud {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 600px;
      margin-bottom: 1.5rem;
    }

    .hud-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hud-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    .hud-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    #lives-display {
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    /* ── Game screen ── */
    #game-screen { gap: 0; width: 100%; max-width: 600px; }

    #game-screen h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    #rgb-display {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
      color: #ffffff;
    }

    #colour-name-hint {
      font-size: 1rem;
      font-weight: 500;
      color: #facc15;
      height: 1.4rem;
      margin-bottom: 0.3rem;
      letter-spacing: 0.04em;
    }

    #message {
      font-size: 1rem;
      height: 1.5rem;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    #message.correct { color: #4ade80; }
    #message.wrong   { color: #f87171; }

    #swatches {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      width: 100%;
    }

    #swatches.easy {
      grid-template-columns: repeat(3, 1fr);
      max-width: 450px;
    }

    #swatches.easy .swatch {
      aspect-ratio: unset;
      height: 125px;
      border-radius: 16px;
    }

    .swatch {
      aspect-ratio: 1;
      border-radius: 12px;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .swatch:hover  { transform: scale(1.05); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
    .swatch:active { transform: scale(0.97); }

    .swatch.correct-swatch {
      border-color: #4ade80;
      box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.3);
    }

    .swatch.wrong-swatch {
      border-color: #f87171;
      box-shadow: 0 0 0 4px rgba(248, 113, 113, 0.3);
    }

    #difficulty-badge {
      margin-top: 1.2rem;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
    }

    /* ── Sidebar toggle button ── */
    #sidebar-toggle {
      position: fixed;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      background: #1e1e1e;
      border: 2px solid #333;
      border-left: none;
      border-radius: 0 10px 10px 0;
      color: #aaa;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 1rem 0.5rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: none;
      z-index: 100;
    }

    #sidebar-toggle:hover { background: #2a2a2a; color: #fff; }
    #sidebar-toggle.visible { display: block; }
    #sidebar-toggle.open { left: 240px; border-left: 2px solid #333; border-right: none; border-radius: 0 10px 10px 0; }

    /* ── Reference sidebar ── */
    #ref-sidebar {
      position: fixed;
      top: 0;
      left: -240px;
      width: 240px;
      height: 100vh;
      background: #181818;
      border-right: 2px solid #2a2a2a;
      overflow: hidden;
      padding: 1rem;
      transition: left 0.3s ease;
      z-index: 99;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      gap: 0;
    }

    #ref-sidebar.open { left: 0; }

    #ref-sidebar h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a2a;
    }

    .ref-channel {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .ref-channel-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .ref-channel-label.red   { color: #f87171; }
    .ref-channel-label.green { color: #4ade80; }
    .ref-channel-label.blue  { color: #60a5fa; }

    .ref-swatches {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .ref-swatch-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ref-swatch {
      width: 37px;
      height: 37px;
      border-radius: 5px;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.05);
    }

    .ref-swatch-label {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0 6px;
      font-variant-numeric: tabular-nums;
    }

    .ref-swatch-label .ch-header {
      font-size: 0.6rem;
      font-weight: 700;
      color: #888;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .ref-swatch-label .ch-value {
      font-size: 0.72rem;
      color: #fff;
      text-align: center;
    }

    /* ── Mixing sidebar toggle button ── */
    #mix-toggle {
      position: fixed;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      background: #1e1e1e;
      border: 2px solid #333;
      border-right: none;
      border-radius: 10px 0 0 10px;
      color: #aaa;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      padding: 1rem 0.5rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: none;
      z-index: 100;
    }

    #mix-toggle:hover { background: #2a2a2a; color: #fff; }
    #mix-toggle.visible { display: block; }
    #mix-toggle.open { right: 220px; border-right: 2px solid #333; border-left: none; border-radius: 10px 0 0 10px; }

    /* ── Mixing sidebar ── */
    #mix-sidebar {
      position: fixed;
      top: 0;
      right: -220px;
      width: 220px;
      height: 100vh;
      background: #181818;
      border-left: 2px solid #2a2a2a;
      overflow: hidden;
      padding: 1rem;
      transition: right 0.3s ease;
      z-index: 99;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0;
    }

    #mix-sidebar.open { right: 0; }

    #mix-sidebar h2 {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a2a;
    }

    .mix-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 1rem 0;
      border-bottom: 1px solid #2a2a2a;
    }

    .mix-row:last-child {
      border-bottom: none;
    }

    .mix-swatch {
      width: 34px;
      height: 34px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    .mix-op {
      font-size: 0.8rem;
      color: #555;
      font-weight: 700;
      flex-shrink: 0;
    }

    .mix-result-label {
      font-size: 0.72rem;
      color: #fff;
      margin-left: 2px;
    }

/* ── Game Over ── */
    #game-over {
      gap: 1.2rem;
      text-align: center;
    }

    #game-over h2 {
      font-size: 2.5rem;
      font-weight: 800;
      color: #f87171;
      letter-spacing: 0.05em;
    }

    #game-over p { font-size: 1rem; color: #888; }

    #final-score {
      font-size: 3.5rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }

    .game-over-btns {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 280px;
    }

    .action-btn {
      padding: 0.75rem 2.5rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    #play-again {
      background: #4ade80;
      color: #121212;
    }
    #play-again:hover  { background: #86efac; transform: scale(1.04); }

    #change-difficulty {
      background: #1e1e1e;
      color: #aaa;
      border: 2px solid #333;
    }
    #change-difficulty:hover { background: #2a2a2a; transform: scale(1.04); }

    .action-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>

  <!-- Reference sidebar (Easy + Medium only) -->
  <div id="ref-sidebar">
    <h2>Colour Reference</h2>

    <div class="ref-channel">
      <span class="ref-channel-label red">Red</span>
      <div class="ref-swatches" id="ref-red"></div>
    </div>

    <div class="ref-channel">
      <span class="ref-channel-label green">Green</span>
      <div class="ref-swatches" id="ref-green"></div>
    </div>

    <div class="ref-channel">
      <span class="ref-channel-label blue">Blue</span>
      <div class="ref-swatches" id="ref-blue"></div>
    </div>

  </div>

  <!-- Sidebar toggle tab -->
  <button id="sidebar-toggle">Reference</button>

  <!-- Mixing sidebar (Easy + Medium only) -->
  <div id="mix-sidebar">
    <h2>Colour Mixing</h2>
    <div id="mix-rows"></div>
  </div>

  <!-- Mixing sidebar toggle tab -->
  <button id="mix-toggle">Mixing</button>

  <!-- Start / difficulty screen -->
  <div id="start-screen" class="screen active">
    <h1>Colour Guess</h1>
    <p>Pick a difficulty to start</p>

    <button class="difficulty-btn easy" data-diff="easy">
      <span class="diff-icon">🟢</span>
      <span class="diff-text">
        <span class="diff-name">Easy</span>
        <span class="diff-desc">RGB value + colour name hint. Only 3 swatches to choose from.</span>
      </span>
    </button>

    <button class="difficulty-btn medium" data-diff="medium">
      <span class="diff-icon">🟡</span>
      <span class="diff-text">
        <span class="diff-name">Medium</span>
        <span class="diff-desc">RGB value only. Swatches are random.</span>
      </span>
    </button>

    <button class="difficulty-btn hard" data-diff="hard">
      <span class="diff-icon">🔴</span>
      <span class="diff-text">
        <span class="diff-name">Hard</span>
        <span class="diff-desc">RGB value only. Swatches are very close to the correct colour.</span>
      </span>
    </button>
  </div>

  <!-- Game screen -->
  <div id="game-screen" class="screen">
    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score-value">0</span>
      </div>
      <div class="hud-block">
        <span class="hud-label">Lives</span>
        <span id="lives-display"></span>
      </div>
      <div class="hud-block">
        <span class="hud-label">Round</span>
        <span class="hud-value" id="round-value">1</span>
      </div>
    </div>

    <h1>Guess the Colour</h1>
    <div id="rgb-display"></div>
    <div id="colour-name-hint"></div>
    <div id="message"></div>
    <div id="swatches"></div>
    <div id="difficulty-badge"></div>
  </div>

  <!-- Game over screen -->
  <div id="game-over" class="screen">
    <h2>Game Over</h2>
    <p>Your final score</p>
    <div id="final-score"></div>
    <div class="game-over-btns">
      <button class="action-btn" id="play-again">Play Again</button>
      <button class="action-btn" id="change-difficulty">Change Difficulty</button>
    </div>
  </div>

  <script>
    // ── Named colours for Easy mode ──
    const NAMED_COLOURS = [
      { name: 'Crimson',       rgb: [220, 20,  60]  },
      { name: 'Tomato',        rgb: [255, 99,  71]  },
      { name: 'Coral',         rgb: [255, 127, 80]  },
      { name: 'Orange',        rgb: [255, 165, 0]   },
      { name: 'Gold',          rgb: [255, 215, 0]   },
      { name: 'Yellow',        rgb: [255, 255, 0]   },
      { name: 'Chartreuse',    rgb: [127, 255, 0]   },
      { name: 'Lime',          rgb: [0,   255, 0]   },
      { name: 'Mint',          rgb: [62,  180, 137] },
      { name: 'Teal',          rgb: [0,   128, 128] },
      { name: 'Cyan',          rgb: [0,   255, 255] },
      { name: 'Sky Blue',      rgb: [135, 206, 235] },
      { name: 'Dodger Blue',   rgb: [30,  144, 255] },
      { name: 'Royal Blue',    rgb: [65,  105, 225] },
      { name: 'Navy',          rgb: [0,   0,   128] },
      { name: 'Indigo',        rgb: [75,  0,   130] },
      { name: 'Violet',        rgb: [238, 130, 238] },
      { name: 'Magenta',       rgb: [255, 0,   255] },
      { name: 'Hot Pink',      rgb: [255, 105, 180] },
      { name: 'Deep Pink',     rgb: [255, 20,  147] },
      { name: 'Salmon',        rgb: [250, 128, 114] },
      { name: 'Sienna',        rgb: [160, 82,  45]  },
      { name: 'Chocolate',     rgb: [210, 105, 30]  },
      { name: 'Peru',          rgb: [205, 133, 63]  },
      { name: 'Tan',           rgb: [210, 180, 140] },
      { name: 'Khaki',         rgb: [240, 230, 140] },
      { name: 'Olive',         rgb: [128, 128, 0]   },
      { name: 'Forest Green',  rgb: [34,  139, 34]  },
      { name: 'Sea Green',     rgb: [46,  139, 87]  },
      { name: 'Steel Blue',    rgb: [70,  130, 180] },
      { name: 'Slate Blue',    rgb: [106, 90,  205] },
      { name: 'Orchid',        rgb: [218, 112, 214] },
      { name: 'Plum',          rgb: [221, 160, 221] },
      { name: 'Lavender',      rgb: [230, 230, 250] },
      { name: 'White',         rgb: [255, 255, 255] },
      { name: 'Silver',        rgb: [192, 192, 192] },
      { name: 'Gray',          rgb: [128, 128, 128] },
    ];

    // ── Reference sidebar intervals ──
    const REF_INTERVALS = [50, 100, 150, 200, 250];

    function buildSidebar() {
      const channels = [
        { id: 'ref-red',   fn: v => [v, 0, 0] },
        { id: 'ref-green', fn: v => [0, v, 0] },
        { id: 'ref-blue',  fn: v => [0, 0, v] },
      ];

      channels.forEach(({ id, fn }) => {
        const container = document.getElementById(id);
        container.innerHTML = '';
        REF_INTERVALS.forEach(val => {
          const [r, g, b] = fn(val);
          const row = document.createElement('div');
          row.className = 'ref-swatch-row';

          const swatch = document.createElement('div');
          swatch.className = 'ref-swatch';
          swatch.style.backgroundColor = `rgb(${r},${g},${b})`;

          const label = document.createElement('div');
          label.className = 'ref-swatch-label';
          ['R', 'G', 'B'].forEach(ch => {
            const h = document.createElement('span');
            h.className = 'ch-header';
            h.textContent = ch;
            label.appendChild(h);
          });
          [r, g, b].forEach(v => {
            const s = document.createElement('span');
            s.className = 'ch-value';
            s.textContent = v;
            label.appendChild(s);
          });

          row.appendChild(swatch);
          row.appendChild(label);
          container.appendChild(row);
        });
      });
    }

    buildSidebar();


    // ── Reference sidebar toggle ──
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const refSidebar    = document.getElementById('ref-sidebar');
    let sidebarOpen = false;

    sidebarToggle.addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      refSidebar.classList.toggle('open', sidebarOpen);
      sidebarToggle.classList.toggle('open', sidebarOpen);
      sidebarToggle.textContent = sidebarOpen ? 'Close' : 'Reference';
    });

    function setSidebarVisible(visible) {
      sidebarToggle.classList.toggle('visible', visible);
      mixToggle.classList.toggle('visible', visible);
      if (!visible) {
        sidebarOpen = false;
        refSidebar.classList.remove('open');
        sidebarToggle.classList.remove('open');
        sidebarToggle.textContent = 'Reference';
        mixOpen = false;
        mixSidebar.classList.remove('open');
        mixToggle.classList.remove('open');
        mixToggle.textContent = 'Mixing';
      }
    }

    // ── Mixing sidebar toggle ──
    const mixToggle  = document.getElementById('mix-toggle');
    const mixSidebar = document.getElementById('mix-sidebar');
    let mixOpen = false;

    mixToggle.addEventListener('click', () => {
      mixOpen = !mixOpen;
      mixSidebar.classList.toggle('open', mixOpen);
      mixToggle.classList.toggle('open', mixOpen);
      mixToggle.textContent = mixOpen ? 'Close' : 'Mixing';
    });

    // ── Build mixing rows ──
    const MIXES = [
      { inputs: [[255,0,0],[0,255,0]],            result: [255,255,0],   name: 'Yellow'  },
      { inputs: [[255,0,0],[0,0,255]],            result: [255,0,255],   name: 'Magenta' },
      { inputs: [[0,255,0],[0,0,255]],            result: [0,255,255],   name: 'Cyan'    },
      { inputs: [[255,0,0],[0,255,0],[0,0,255]],  result: [255,255,255], name: 'White'   },
    ];

    (function buildMixing() {
      const container = document.getElementById('mix-rows');
      MIXES.forEach(({ inputs, result, name }) => {
        const row = document.createElement('div');
        row.className = 'mix-row';

        inputs.forEach((col, i) => {
          if (i > 0) {
            const plus = document.createElement('span');
            plus.className = 'mix-op';
            plus.textContent = '+';
            row.appendChild(plus);
          }
          const s = document.createElement('div');
          s.className = 'mix-swatch';
          s.style.backgroundColor = `rgb(${col.join(',')})`;
          row.appendChild(s);
        });

        const eq = document.createElement('span');
        eq.className = 'mix-op';
        eq.textContent = '=';
        row.appendChild(eq);

        const res = document.createElement('div');
        res.className = 'mix-swatch';
        res.style.backgroundColor = `rgb(${result.join(',')})`;
        row.appendChild(res);

        const lbl = document.createElement('span');
        lbl.className = 'mix-result-label';
        lbl.textContent = name;
        row.appendChild(lbl);

        container.appendChild(row);
      });
    })();

    // ── State ──
    let difficulty = 'medium';
    let correctIndex = -1;
    let score = 0;
    let lives = 3;
    let round = 1;
    let answered = false;

    const LIFE_FULL  = '♥';
    const LIFE_EMPTY = '♡';

    // ── Colour helpers ──
    function randomChannel() { return Math.floor(Math.random() * 256); }
    function randomColour()  { return [randomChannel(), randomChannel(), randomChannel()]; }
    function clamp(v)        { return Math.max(0, Math.min(255, v)); }
    function toRgbString([r, g, b]) { return `rgb(${r}, ${g}, ${b})`; }

    function nearColour([r, g, b], spread) {
      const delta = () => Math.round((Math.random() - 0.5) * 2 * spread);
      let near;
      do {
        near = [clamp(r + delta()), clamp(g + delta()), clamp(b + delta())];
      } while (near[0] === r && near[1] === g && near[2] === b);
      return near;
    }

    // ── Round logic ──
    function buildRound() {
      let correct, colourName;

      if (difficulty === 'easy') {
        const entry = NAMED_COLOURS[Math.floor(Math.random() * NAMED_COLOURS.length)];
        correct    = entry.rgb;
        colourName = entry.name;
      } else {
        correct    = randomColour();
        colourName = null;
      }

      const count = difficulty === 'easy' ? 3 : 6;
      correctIndex = Math.floor(Math.random() * count);
      const spread = difficulty === 'hard' ? 30 : 256;

      const colours = Array.from({ length: count }, (_, i) =>
        i === correctIndex ? correct : nearColour(correct, spread)
      );

      return { correct, colourName, colours };
    }

    function newRound() {
      answered = false;
      const { correct, colourName, colours } = buildRound();

      document.getElementById('rgb-display').textContent = toRgbString(correct);

      const hint = document.getElementById('colour-name-hint');
      hint.textContent = colourName ? colourName : '';

      const msg = document.getElementById('message');
      msg.textContent = '';
      msg.className = '';

      const container = document.getElementById('swatches');
      container.innerHTML = '';
      container.className = difficulty === 'easy' ? 'easy' : '';

      colours.forEach((colour, i) => {
        const swatch = document.createElement('div');
        swatch.className = 'swatch';
        swatch.style.backgroundColor = toRgbString(colour);
        swatch.addEventListener('click', () => handleGuess(i, swatch));
        container.appendChild(swatch);
      });

      updateHUD();
    }

    function handleGuess(index, swatch) {
      if (answered) return;

      const msg = document.getElementById('message');

      if (index === correctIndex) {
        answered = true;
        score += 10;
        round++;
        swatch.classList.add('correct-swatch');
        msg.textContent = '✓ Correct!';
        msg.className = 'correct';
        updateHUD();
        setTimeout(newRound, 1200);
      } else {
        lives--;
        swatch.classList.add('wrong-swatch');
        swatch.style.pointerEvents = 'none';
        updateHUD();

        if (lives === 0) {
          msg.textContent = '✗ Wrong, try again!';
          msg.className = 'wrong';
          const swatches = document.querySelectorAll('.swatch');
          swatches.forEach(s => s.style.pointerEvents = 'none');
          setTimeout(() => {
            msg.textContent = '✗ Wrong — here\'s the correct colour!';
            swatches[correctIndex].classList.add('correct-swatch');
          }, 1000);
          setTimeout(showGameOver, 3000);
        } else {
          msg.textContent = '✗ Wrong, try again!';
          msg.className = 'wrong';
        }
      }
    }

    // ── HUD ──
    function updateHUD() {
      document.getElementById('score-value').textContent = score;
      document.getElementById('round-value').textContent = round;
      document.getElementById('lives-display').textContent =
        LIFE_FULL.repeat(lives) + LIFE_EMPTY.repeat(3 - lives);
    }

    // ── Screen transitions ──
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startGame(diff) {
      difficulty = diff;
      score = 0;
      lives = 3;
      round = 1;
      answered = false;

      const labels = { easy: '🟢 Easy', medium: '🟡 Medium', hard: '🔴 Hard' };
      document.getElementById('difficulty-badge').textContent = labels[diff];

      setSidebarVisible(diff === 'easy' || diff === 'medium');

      showScreen('game-screen');
      newRound();
    }

    function showGameOver() {
      setSidebarVisible(false);
      document.getElementById('final-score').textContent = score;
      showScreen('game-over');
    }

    // ── Event listeners ──
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
      btn.addEventListener('click', () => startGame(btn.dataset.diff));
    });

    document.getElementById('play-again').addEventListener('click', () => {
      startGame(difficulty);
    });

    document.getElementById('change-difficulty').addEventListener('click', () => {
      setSidebarVisible(false);
      showScreen('start-screen');
    });
  </script>

</body>
</html>
